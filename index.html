<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>지상파 시청률 TOP 20</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f8f9fa; }
        .card { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { border-bottom: 3px solid #007bff; padding-bottom: 10px; font-size: 1.6rem; color: #333; }
        .update { text-align: right; color: #888; font-size: 0.9em; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #fcfcfc; color: #555; }
        .rank { font-weight: bold; color: #007bff; width: 40px; }
        .rate { font-weight: bold; color: #e74c3c; text-align: right; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📺 지상파 시청률 순위</h1>
        <p class="update">기준: <span id="time">-</span></p>
        <table>
            <thead>
                <tr>
                    <th>순위</th>
                    <th>프로그램</th>
                    <th>채널</th>
                    <th style="text-align:right;">시청률</th>
                </tr>
            </thead>
            <tbody id="list">
                <tr><td colspan="4" style="text-align:center; padding:40px;">데이터를 가져오는 중입니다...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                document.getElementById('time').innerText = data.date;
                const list = document.getElementById('list');
                list.innerHTML = '';

                if (!data.terrestrial || data.terrestrial.length === 0) {
                    list.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:40px;">수집된 데이터가 없습니다.</td></tr>';
                    return;
                }

                data.terrestrial.forEach(item => {
                    list.innerHTML += `<tr>
                        <td class="rank">${item.rank}</td>
                        <td>${item.program}</td>
                        <td>${item.channel}</td>
                        <td class="rate">${item.rate}%</td>
                    </tr>`;
                });
            });
    </script>
</body>
</html>
