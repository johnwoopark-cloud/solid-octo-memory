<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>지상파 시청률 TOP 20</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        .box { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { border-bottom: 2px solid #007bff; padding-bottom: 10px; color: #1a1a1a; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: #007bff; color: white; }
        tr:nth-child(even) { background: #f8f9fa; }
        .update { text-align: right; color: #666; font-size: 0.85em; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>📺 지상파 시청률 순위</h1>
        <p class="update">업데이트: <span id="update-time">-</span></p>
        <table>
            <thead>
                <tr>
                    <th>순위</th>
                    <th>채널</th>
                    <th>프로그램</th>
                    <th>시청률</th>
                </tr>
            </thead>
            <tbody id="list"></tbody>
        </table>
    </div>

    <script>
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                document.getElementById('update-time').innerText = data.date;
                const list = document.getElementById('list');
                if (!data.terrestrial || data.terrestrial.length === 0) {
                    list.innerHTML = '<tr><td colspan="4" style="text-align:center;">데이터를 불러오는 중이거나 아직 업데이트되지 않았습니다.</td></tr>';
                    return;
                }
                data.terrestrial.forEach(item => {
                    list.innerHTML += `<tr>
                        <td>${item.rank}</td>
                        <td>${item.channel}</td>
                        <td>${item.program}</td>
                        <td><b>${item.rate}%</b></td>
                    </tr>`;
                });
            });
    </script>
</body>
</html>
